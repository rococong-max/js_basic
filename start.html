<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트 시작</title>
    <style>
        h1 {color: red;} /* 내부 스타일시트 */
    </style>
    <script>
        // 내부 자바스크립트 작성 위치-1(head) - 데이터불러오기
        // h1 (error)
    </script>
    <!-- 외부 스크립트 연결 -->
    <!-- defer 없이 html 동적 js를 아래파일에서 작성한다면 -> error (읽기전이기 때문) -->
    <!-- defer 작성 시 script위치 무시하고 html모두 읽은 후 -> script 처리 (ok) -->
    <script src="./scripts/start.js" defer></script><!-- h1 (ok) -->
</head>
<body>
    <h1>제목</h1>
    <!-- 기본 HTML 작성 위치 (script는 맨 아래에만 배치하기) -->
    <script>
        // 내부 자바스크립트 작성 위치-2(body) - html태그 읽은 후 동적처리
        // h1 (ok)
    </script>
    <script src="./scripts/start.js"></script>
</body>
</html>
